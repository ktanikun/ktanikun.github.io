site_name: ktanikun
site_url: https://ktanikun.github.io
repo_url: https://github.com/ktanikun/ktanikun.github.io
repo_name: ktanikun/ktanikun.github.io
site_author: ktanikun
site_description: >-
  Homepage

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
  font:
    text: "Zen Kaku Gothic New"
    code: "Fira Code"
  palette:
    scheme: "default"
    primary: "light blue"
    accent: "pink"
  logo: "img/ktanikun.jpg"
  favicon: "img/ktanikun.ico"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ktanikun/
    - icon: fontawesome/brands/twitter
      link: https://x.com/anemame2021

markdown_extensions:
  - toc:
      permalink: True
  - admonition
  - codehilite
  - footnotes
  - def_list
  - attr_list
  - meta
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      # user: squidfunk
      # repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - "js/extra.js"
  - "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"

extra_css:
  - "https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Fira+Code&display=swap"
  - "css/custom.css"

plugins:
  - search

edit_uri: edit/main/docs/

nav:
  - Home: index.md
